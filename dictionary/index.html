<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plains Sign Dictionary</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="/dictionary/dictionary.css">
  
</head>
<body>
  <main class="container dictionary-root">
    <h1>Plains Sign Dictionary</h1>

    <label for="search" class="sr-only">Search dictionary</label>
    <div class="search-row">
      <input id="search" type="search" placeholder="Search headwords, sign description, or notes…" autofocus />
      <button id="clear" title="Clear search">✕</button>
    </div>

    <div id="status" class="muted">Loading dictionary…</div>

    <div id="results" class="results" aria-live="polite"></div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
