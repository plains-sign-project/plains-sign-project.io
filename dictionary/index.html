<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plains Sign Dictionary</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="/dictionary/dictionary.css">
  <link rel="stylesheet" href="/style.css">
  <meta name="color-scheme" content="light dark">
  <!-- Fuse.js for fuzzy searching -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js" defer></script>
</head>
<body>
  <nav class="markdown-body">
    <div class="nav-inner">
      <a href="/">Home</a> |
      <a href="/dictionary/">Dictionary</a> |
      <a href="/resources/" aria-current="page">Resources</a>
    </div>
  </nav>
  <main class="container dictionary-root markdown-body">
    <h1>Plains Sign Dictionary</h1>

    <label for="search" class="sr-only">Search dictionary</label>
    <div class="search-row">
      <input id="search" type="search" placeholder="Search headwords, sign description, author, or notes…" autofocus />
      <button id="clear" title="Clear search">✕</button>
    </div>

    <!-- controls: fuzzy, exact, field selection, first letter, tag -->
    <div class="controls-row">
      <label><input id="fuzzy" type="checkbox"> Fuzzy (typos)</label>
      <label><input id="exact" type="checkbox"> Exact headword only</label>

      <label for="fieldSelect">Search in:</label>
      <select id="fieldSelect">
        <option value="all">All</option>
        <option value="headword">Headword</option>
        <option value="definition">Sign Description</option>
        <option value="note">Note</option>
        <option value="author">Author</option>
      </select>

      <label for="firstLetter">First letter:</label>
      <select id="firstLetter">
        <option value="">All</option>
      </select>

      <label for="tagFilter">Tag:</label>
      <select id="tagFilter">
        <option value="">All</option>
      </select>

      <button id="refresh" title="Refresh dictionary">Refresh</button>
    </div>

    <div id="status" class="muted">Loading dictionary…</div>

    <div id="results" class="results" aria-live="polite"></div>
  </main>

  <!-- Entry detail modal -->
  <div id="detailModal" class="detail-modal" aria-hidden="true">
    <div class="detail-panel">
      <button id="closeDetail" class="close-btn" aria-label="Close">✕</button>
      <div id="detailContent"></div>
    </div>
    <div class="detail-backdrop"></div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
