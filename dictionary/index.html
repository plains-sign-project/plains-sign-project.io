<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dictionary</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">

  <style>
    body {
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 1rem;
    }

    #search {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .entry {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .headwords {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .note {
      font-style: italic;
      margin-top: 0.5rem;
    }

    .sign {
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Dictionary</h1>

  <input
    id="search"
    type="text"
    placeholder="Search for a word...">

  <div id="results"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7"></script>
<script src="script.js"></script>

</body>
</html>
