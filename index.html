<!DOCTYPE html>
<html>
<nav>
  <a href="./">Home</a> |
  <a href="./dictionary">Dictionary</a>
</nav>
    <head>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
    
    <meta name="color-scheme" content="light dark">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <style>
body {
    margin: 0;
}

.markdown-body {
    box-sizing: border-box;
    max-width: 980px;
    margin: 0 auto;
    padding: 1rem;
}

.markdown-body img {
    max-width: 100%;
    height: auto;
}

.markdown-body pre {
    overflow-x: auto;
}

@media (max-width: 768px) {
    .markdown-body {
        padding: 0.75rem;
    }

    .markdown-body table {
        display: block;
        overflow-x: auto;
    }
}

/* Light mode */
@media (prefers-color-scheme: light) {
    body {
        background: white;
    }

    .markdown-body {
        background: white;
        color: black;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
        color: black;
    }
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
    body {
        background: black;
    }

    .markdown-body {
        background: black;
        color: white;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
        color: #f0f6fc;
    }
}    
    </style>
</head>
<body>

<article id="content" class="markdown-body"></article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch("README.md")
  .then(r => r.text())
  .then(md => {
      document.getElementById("content").innerHTML =
          marked.parse(md);
  });
</script>

</body>
</html>
