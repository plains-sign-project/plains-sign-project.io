<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">

    <style>
    body {
        background: white;
        margin: 0;
    }

    .markdown-body {
        color: black;
        background: white;

        max-width: 980px;
        margin: 0 auto;
        padding: 2rem;

        box-sizing: border-box;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
        color: black;
    }

    .markdown-body a {
        color: black;
        text-decoration: underline;
    }
    </style>
</head>
<body>

<article id="content" class="markdown-body"></article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch("README.md")
  .then(r => r.text())
  .then(md => {
      document.getElementById("content").innerHTML =
          marked.parse(md);
  });
</script>

</body>
</html>
